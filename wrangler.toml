name = "cron-serverless-edge-dns-gateway"
main = "cron.js"
compatibility_date = "2024-01-01"
workers_dev = false

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "serverless-edge-dns-gateway-db"

[[services]]
binding = "SELF"
service = "cron-serverless-edge-dns-gateway"
